<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Formulario de Inscripción</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- CSS PROPIO -->
  <link rel="stylesheet" href="css/estilos-components.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

  <!-- HEADER + NAVBAR -->
  <div class="header-container">
    <div id="header"></div>
    <div id="navbar"></div>
  </div>

  <!-- BANNER -->
  <div class="banner">
    <img src="https://picsum.photos/1200/300" class="img-fluid w-100">
  </div>

  <!-- CONTENIDO -->
  <main class="container my-5">

    <!-- TITULO -->
    <h3 class="text-center mb-4">
      Formulario de Inscripción
    </h3>

    <!-- STEPS -->
    <div class="text-center mb-4">
      <span class="step active">1</span>
      <span class="step">2</span>
    </div>

    <!-- FORM CARD -->
    <div class="form-container">

      <form id="formInscripcionCompleto">

        <!-- PASO 1 -->
        <div id="paso1">

          <div class="mb-3">
            <label>Nombre completo</label>
            <input id="nombre" type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Número de identificación</label>
            <input id="identificacion" type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Provincia</label>
            <input id="provincia" type="text" class="form-control">
          </div>

          <div class="mb-3">
            <label>Cantón</label>
            <input id="canton" type="text" class="form-control">
          </div>

          <div class="mb-3">
            <label>Distrito</label>
            <input id="distrito" type="text" class="form-control">
          </div>

          <div class="mb-3">
            <label>Correo electrónico</label>
            <input id="correo" type="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Teléfono</label>
            <input id="telefono" type="text" class="form-control">
          </div>

          <button type="button" class="btn btn-primary" id="btnSiguiente">
            Siguiente →
          </button>

        </div>

        <!-- PASO 2 -->
        <div id="paso2" class="d-none">

          <div class="mb-3">
            <label>¿Requiere transporte?</label><br>
            <input type="radio" name="transporte"> Sí
            <input type="radio" name="transporte"> No
          </div>

          <div class="mb-3">
            <label>¿Requiere hospedaje?</label><br>
            <input type="radio" name="hospedaje"> Sí
            <input type="radio" name="hospedaje"> No
          </div>

          <div class="mb-3">
            <label>¿Alergias?</label><br>
            <input type="radio" name="alergias"> Sí
            <input type="radio" name="alergias"> No
          </div>

          <div class="mb-3">
            <label>Descripción</label>
            <textarea id="descripcion" class="form-control"></textarea>
          </div>

          <button type="button" class="btn btn-secondary" id="btnAnterior">
            ← Anterior
          </button>

          <button type="submit" class="btn btn-primary">
            Enviar
          </button>

        </div>

      </form>

    </div>

  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/load-components.js"></script>
  <script src="js/inscripcion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
