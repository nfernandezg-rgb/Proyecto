<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/load-components.css">
</head>

<body>

    <div id="editor-topbar"></div>

    <div class="d-flex min-vh-100">

        <div id="admin-sidebar"></div>

        <main id="contenido-admin" class="flex-grow-1 p-4">
            <h4>Bienvenido Administrador</h4>
            <p>Seleccione una opción del menú</p>
        </main>

    </div>

    <!-- MODAL DETALLE EVENTO -->
    <div class="modal fade" id="modalDetalleEvento" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Detalle del Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body modal-dialog modal-x1 modal-dialog-scrollable" id="contenido-detalle-evento"></div>

            </div>
        </div>
    </div>

    <!-- MODAL RECHAZO EVENTO -->
    <div class="modal fade" id="modalRechazoEvento" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Rechazo de Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p class="text-muted small">
                        Indique el motivo del rechazo. Este mensaje será enviado al editor.
                    </p>

                    <textarea id="motivoRechazo" class="form-control mb-2" rows="4" maxlength="300"
                        placeholder="Introduzca el motivo del rechazo"></textarea>

                    <small class="text-muted d-block text-end">
                        <span id="contador">0</span> / 300 caracteres
                    </small>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">
                        Cancelar
                    </button>

                    <button class="btn btn-primary" id="btnConfirmarRechazo">
                        Aceptar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/load-components.js"></script>
    <script src="js/admin.js"></script>

</body>

</html>
