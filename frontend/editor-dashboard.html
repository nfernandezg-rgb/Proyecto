<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Editor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <div id="editor-topbar"></div>

    <!-- CONTENIDO -->
    <div class="d-flex">

        <!-- SIDEBAR -->
        <div id="editor-sidebar"></div>

        <!-- MAIN DINÁMICO -->
        <main id="contenido-dinamico" class="flex-grow-1 p-4">
            <h4>Bienvenido Editor</h4>
            <p>Seleccione una opción del menú</p>
        </main>

    </div>

    <!-- MODAL ANOTACIONES -->
    <div class="modal fade" id="modalAnotaciones" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">

                <h5 class="mb-3">Motivo del rechazo</h5>

                <p id="texto-anotacion" class="text-muted">
                    Aquí aparecerá el motivo enviado por el administrador
                </p>

                <div class="text-end">
                    <button class="btn btn-primary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/load-components.js"></script>
    <script src="js/editor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
