<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Editor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- TOPBAR -->
    <nav class="editor-topbar d-flex justify-content-between align-items-center px-4">

        <div class="fw-bold">
            SICID - Editor
        </div>

        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm btn-light">A-</button>
            <button class="btn btn-sm btn-light">A+</button>
            <i class="bi bi-sun"></i>
            <i class="bi bi-bell"></i>
            <div class="perfil-circle">MC</div>
        </div>

    </nav>

    <!-- CONTENIDO -->
    <div class="d-flex">

        <!-- SIDEBAR -->
        <aside class="sidebar p-3">

            <h6>Eventos</h6>
            <ul class="list-unstyled">
                <li><a href="#" id="menu-crear">Crear Evento</a></li>
                <li><a href="#" id="menu-publicados">Eventos Publicados</a></li>
                <li><a href="#" id="menu-borrador">Eventos en Borrador</a></li>
                <li><a href="#" id="menu-finalizados">Eventos Finalizados</a></li>
            </ul>

            <h6 class="mt-4">Usuarios</h6>
            <ul class="list-unstyled">
                <li><a href="#" id="menu-difusion">Crear lista de difusión</a></li>
                <li><a href="#" id="menu-listas">Listas de difusión</a></li>
                <li><a href="#" id="menu-suscriptores">Suscriptores</a></li>
                <li><a href="#" id="menu-consultas">Consultas</a></li>
            </ul>

        </aside>

        <!-- MAIN DINÁMICO -->
        <main id="contenido-dinamico" class="flex-grow-1 p-4">

            <h4>Bienvenido Editor</h4>
            <p>Seleccione una opción del menú</p>

        </main>

    </div>

    <!-- JS -->
    <script src="js/editor.js"></script>

</body>

</html>
